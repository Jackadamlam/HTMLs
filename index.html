<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMOS - Product Manager Operating System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 1.1em;
    }
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px 40px;
      text-decoration: none;
      color: #e2e8f0;
      transition: all 0.3s;
      min-width: 200px;
    }
    .card:hover {
      background: rgba(59,130,246,0.1);
      border-color: #3b82f6;
      transform: translateY(-4px);
    }
    .card h2 {
      font-size: 1.3em;
      margin-bottom: 8px;
      color: #60a5fa;
    }
    .card p {
      color: #94a3b8;
      font-size: 0.9em;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75em;
      margin-top: 12px;
    }
    .badge-zh { background: rgba(16,185,129,0.2); color: #10b981; }
    .badge-en { background: rgba(139,92,246,0.2); color: #8b5cf6; }
    .badge-book { background: rgba(245,158,11,0.2); color: #f59e0b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PMOS</h1>
    <p class="subtitle">Product Manager Operating System · 68 Skills · 42 Commands</p>
    <div class="cards">
      <a href="PMOS-Index.html" class="card">
        <h2>技能索引</h2>
        <p>Skills & Commands Index</p>
        <span class="badge badge-zh">中文版</span>
      </a>
      <a href="PMOS-Index-EN.html" class="card">
        <h2>Skills Index</h2>
        <p>Skills & Commands Index</p>
        <span class="badge badge-en">English</span>
      </a>
      <a href="PMOS-Handbook-Final.html" class="card">
        <h2>Handbook</h2>
        <p>Complete PMOS Handbook</p>
        <span class="badge badge-book">Handbook</span>
      </a>
    </div>
  </div>
</body>
</html>
